# Источники «Зеркала сводок». Узкий скоуп: собираем только то, что
# одновременно имеет смысл фиксировать в ledger И морозить в Wayback.
#
# voice: ru_official | ua_official | independent
# method: telegram | json
# enabled: true только для проверенных бескредовых публичных эндпоинтов.
# archive: true для всех текущих источников — нет второго сорта «собираем, но не морозим».
# Каждый источник — это ЗАЯВЛЕНИЕ, фиксируемое ради подотчётности (не «истина»).

sources:
  # --- Голос 1: РФ официальный — канонический военный голос ---
  - id: ru_official_mod
    name: "Минобороны России (сводка о ходе СВО)"
    voice: ru_official
    method: telegram
    channel: mod_russia
    basket: narrative
    author: "Минобороны России"
    enabled: true          # читается БЕЗ аккаунта (t.me/s)
    archive: true          # Wayback tier A
    note: "Тактические заявления (заняли/уничтожили). Публичное веб-превью t.me/s, без логина/MTProto."

  # --- Голос 2: UA официальный — канонический военный голос ---
  - id: ua_official_genstaff
    name: "Генштаб ЗСУ (оперативна інформація)"
    voice: ua_official
    method: telegram
    channel: GeneralStaffZSU
    basket: narrative
    author: "Генеральний штаб ЗСУ"
    enabled: true          # читается БЕЗ аккаунта (t.me/s); CC-BY-4.0
    archive: true          # Wayback tier A
    note: "Оперативная сводка с фронта. Публичное веб-превью t.me/s, без логина/MTProto."

  # --- Независимый голос: гражданский вред ---
  - id: ind_bellingcat_timemap
    name: "Bellingcat Civilian Harm TimeMap"
    voice: independent
    method: json
    basket: civilian
    author: "Bellingcat"
    url: "https://bellingcat-embeds.ams3.cdn.digitaloceanspaces.com/production/ukr/timemap/api.json"
    enabled: true          # одиночный публичный JSON, без auth
    archive: true          # Wayback tier A
    note: "Атрибуция Bellingcat. Следить, обновляется ли источник дальше."

  # --- Независимый голос: контроль территории ---
  - id: ind_deepstatemap
    name: "DeepStateMAP (контроль территории)"
    voice: independent
    method: json
    basket: territory
    author: "DeepState"
    url: "https://deepstatemap.live/api/history/last"   # подтверждён вживую (200): {id, map:FeatureCollection, datetime}
    enabled: true
    archive: true          # Wayback tier A
    note: "Лиц.: некоммерч., атрибуция, без проксирования API. CDN-кэш ~5 мин."
